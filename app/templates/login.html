{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-12 col-md-5">

    <div class="text-center mb-4">
      <h2 class="fw-bold">🔐 Login</h2>
      <p class="text-muted">Welcome back to ShopGH!</p>
    </div>

    <div class="card shadow border-0 rounded-4 p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-bold">Email Address</label>
          <input type="email" name="email" class="form-control form-control-lg rounded-3"
                 placeholder="you@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Password</label>
          <input type="password" name="password" class="form-control form-control-lg rounded-3"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold btn-lg rounded-3">
          Login →
        </button>
      </form>
      <hr>
      <p class="text-center mb-0">
        Don't have an account?
        <a href="/register" class="text-warning fw-bold">Register here</a>
      </p>
    </div>

  </div>
</div>

{% endblock %}
